<!<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
    <head>
        <title>Quản lý phòng</title>
    <th:block th:replace="base :: css"></th:block>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
</head>
<body>
    <div th:replace="base :: header"></div>

    <section class="container">
        <h1 class="text-center text-info"> QUẢN LÝ PHÒNG</h1>

        <div th:if="${errMsg}" class="alert alert-danger" role="alert">
            <span th:text="${errMsg}"></span>
        </div>

        <form method="post" th:object="${rooms}" th:action="@{/admin/rooms}" enctype="multipart/form-data">
            <div class="mb-3 mt-3">
                <label for="roomNumber" class="form-label">Mã phòng:</label>
                <input type="text" class="form-control" id="roomNumber" placeholder="Số phòng" name="roomNumber" th:field="*{roomNumber}">
            </div>
            <div class="mb-3 mt-3">
                <label for="roomTypes.name" class="form-label">Loại phòng:</label>
                <select th:field="*{roomTypeId}">
                    <option th:each="t: ${roomTypes}" th:value="${t.id}" th:text="${t.name}"></option>
                </select>
            </div>
            <div class="mb-3 mt-3">
                <label for="floor" class="form-label">Tầng:</label>
                <input type="number" class="form-control" id="floor" placeholder="Tầng số" name="floor" th:field="*{floor}">
            </div>
            <div class="mb-3 mt-3">
                <label for="roomTypeId.price" class="form-label">Giá phòng:</label>
                <input type="number" class="form-control" id="roomTypeId.price" placeholder="Giá phòng" name="roomTypeId.price" th:field="*{roomTypeId.price}">
            </div>
            <div class="mb-3 mt-3">
                <label for="file" class="form-label">Ảnh phòng:</label>
                <input type="file" class="form-control" id="file" th:field="*{file}">
            </div>
            <div class="mb-3 mt-3" th:if="${rooms.mainImage != null}">
                <img th:src="${rooms.mainImage}" width="200" />
            </div>
            
            <button th:if="${rooms.id} == null" class="btn btn-success mb-2">Thêm phòng</button>
            <button th:unless="${rooms.id} == null" class="btn btn-success mb-2">Cập nhật thông tin phòng</button>
        
            <input type="hidden" th:field="*{id}"/>
            <input type="hidden" th:field="*{mainImage}"/>
        </form>
    </section>

    <div th:replace="base :: footer"></div>
</body>
</html>
