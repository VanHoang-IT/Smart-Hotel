<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Quản lý phòng</title>
    <th:block th:replace="base :: css"></th:block>
</head>
<body>
    <div th:replace="base :: header"></div>

    <section class="container mt-4 mb-5">
        <h2 class="text-center text-info mb-4">QUẢN LÝ PHÒNG</h2>

        <!-- Alert -->
        <div th:if="${errMsg}" class="alert alert-danger alert-dismissible fade show" role="alert">
            <span th:text="${errMsg}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>
        <div th:if="${successMsg}" class="alert alert-success alert-dismissible fade show" role="alert">
            <span th:text="${successMsg}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>

        <div class="row g-4">
            <!-- Form thêm/sửa phòng -->
            <div class="col-md-4">
                <div class="card shadow-sm">
                    <div class="card-header bg-info text-white fw-bold"
                         th:text="${room.id != null ? 'Cập nhật phòng #' + room.id : 'Thêm phòng mới'}">
                        Thêm phòng mới
                    </div>
                    <div class="card-body">
                        <form method="post"
                              th:action="${room.id != null ? '/SmartHotel/admin/rooms/' + room.id : '/SmartHotel/admin/rooms'}"
                              th:object="${room}"
                              enctype="multipart/form-data">

                            <div class="mb-3">
                                <label class="form-label fw-bold">Tên phòng *</label>
                                <input type="text" class="form-control" placeholder="Nhập tên phòng"
                                       th:field="*{name}" required>
                            </div>

                            <div class="mb-3">
                                <label class="form-label fw-bold">Loại phòng *</label>
                                <select class="form-select" th:field="*{roomTypeId}" required>
                                    <option value="">-- Chọn loại phòng --</option>
                                    <option th:each="t: ${roomTypes}"
                                            th:value="${t.id}"
                                            th:text="${t.name}"></option>
                                </select>
                            </div>

                            <div class="mb-3">
                                <label class="form-label fw-bold">Tầng</label>
                                <input type="number" class="form-control" placeholder="Số tầng"
                                       th:field="*{floor}">
                            </div>

                            <div class="mb-3">
                                <label class="form-label fw-bold">Giá/đêm (VNĐ) *</label>
                                <input type="number" class="form-control" placeholder="Giá phòng"
                                       th:field="*{price}" required>
                            </div>

                            <div class="mb-3">
                                <label class="form-label fw-bold">Trạng thái</label>
                                <select class="form-select" th:field="*{status}">
                                    <option value="AVAILABLE">Trống</option>
                                    <option value="OCCUPIED">Đang có khách</option>
                                    <option value="CLEANING">Đang dọn dẹp</option>
                                    <option value="MAINTENANCE">Bảo trì</option>
                                </select>
                            </div>

                            <div class="mb-3">
                                <label class="form-label fw-bold">Ghi chú</label>
                                <textarea class="form-control" rows="2" th:field="*{note}"
                                          placeholder="Ghi chú thêm..."></textarea>
                            </div>

                            <div class="mb-3">
                                <label class="form-label fw-bold">Ảnh phòng</label>
                                <input type="file" class="form-control" th:field="*{file}" accept="image/*">
                            </div>

                            <div class="mb-3" th:if="${room.mainImage != null}">
                                <img th:src="${room.mainImage}" class="img-fluid rounded" style="max-height: 150px;">
                            </div>

                            <input type="hidden" th:field="*{id}"/>
                            <input type="hidden" th:field="*{mainImage}"/>

                            <div class="d-flex gap-2">
                                <button type="submit" class="btn btn-success flex-grow-1"
                                        th:text="${room.id != null ? 'Cập nhật' : 'Thêm phòng'}">
                                    Thêm phòng
                                </button>
                                <a th:if="${room.id != null}" href="/SmartHotel/admin/rooms"
                                   class="btn btn-outline-secondary">Hủy</a>
                            </div>
                        </form>
                    </div>
                </div>
            </div>

            <!-- Danh sách phòng -->
            <div class="col-md-8">
                <div class="card shadow-sm">
                    <div class="card-header bg-dark text-white fw-bold">Danh sách phòng</div>
                    <div class="card-body">

                        <!-- Filter -->
                        <form method="get" th:action="@{/admin/rooms}" class="row g-2 mb-3">
                            <div class="col-md-4">
                                <input type="text" class="form-control form-control-sm"
                                       name="kw" placeholder="Tìm tên phòng..."
                                       th:value="${kw}">
                            </div>
                            <div class="col-md-3">
                                <select class="form-select form-select-sm" name="status">
                                    <option value="">Tất cả trạng thái</option>
                                    <option value="AVAILABLE" th:selected="${status == 'AVAILABLE'}">Trống</option>
                                    <option value="OCCUPIED" th:selected="${status == 'OCCUPIED'}">Đang có khách</option>
                                    <option value="CLEANING" th:selected="${status == 'CLEANING'}">Đang dọn dẹp</option>
                                    <option value="MAINTENANCE" th:selected="${status == 'MAINTENANCE'}">Bảo trì</option>
                                </select>
                            </div>
                            <div class="col-md-3">
                                <select class="form-select form-select-sm" name="typeId">
                                    <option value="">Tất cả loại phòng</option>
                                    <option th:each="t: ${roomTypes}"
                                            th:value="${t.id}"
                                            th:text="${t.name}"
                                            th:selected="${typeId == t.id.toString()}"></option>
                                </select>
                            </div>
                            <div class="col-md-2 d-flex gap-1">
                                <button type="submit" class="btn btn-primary btn-sm flex-grow-1">Lọc</button>
                                <a href="/SmartHotel/admin/rooms" class="btn btn-outline-secondary btn-sm">Xóa</a>
                            </div>
                        </form>

                        <table class="table table-striped table-hover align-middle">
                            <thead class="table-light">
                                <tr>
                                    <th>Ảnh</th>
                                    <th>Tên phòng</th>
                                    <th>Loại</th>
                                    <th>Tầng</th>
                                    <th>Giá</th>
                                    <th>Trạng thái</th>
                                    <th></th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr th:each="r: ${rooms}">
                                    <td>
                                        <img th:if="${r.mainImage != null and !#strings.isEmpty(r.mainImage)}"
                                             th:src="${r.mainImage}"
                                             width="60" height="45"
                                             style="object-fit:cover; border-radius:4px;">
                                        <span th:unless="${r.mainImage != null and !#strings.isEmpty(r.mainImage)}" class="text-muted">—</span>
                                    </td>
                                    <td class="fw-bold" th:text="${r.name}"></td>
                                    <td th:text="${r.roomTypeId?.name}"></td>
                                    <td th:text="${r.floor != null ? r.floor : '—'}"></td>
                                    <td th:text="${#numbers.formatDecimal(r.price, 0, 'COMMA', 0, 'POINT')} + ' đ'"></td>
                                    <td>
                                        <span th:switch="${r.status}">
                                            <span th:case="'AVAILABLE'" class="badge bg-success">Trống</span>
                                            <span th:case="'OCCUPIED'" class="badge bg-danger">Đang có khách</span>
                                            <span th:case="'CLEANING'" class="badge bg-warning text-dark">Đang dọn</span>
                                            <span th:case="'MAINTENANCE'" class="badge bg-secondary">Bảo trì</span>
                                            <span th:case="*" class="badge bg-light text-dark" th:text="${r.status}"></span>
                                        </span>
                                    </td>
                                    <td>
                                        <a th:href="@{/admin/rooms/} + ${r.id}" class="btn btn-warning btn-sm me-1">Sửa</a>
                                        <button class="btn btn-danger btn-sm"
                                                th:onclick="'deleteRoom(\'' + @{/api/rooms/} + ${r.id} + '\')'">Xóa</button>
                                    </td>
                                </tr>
                                <tr th:if="${#lists.isEmpty(rooms)}">
                                    <td colspan="7" class="text-center text-muted">Không có phòng nào</td>
                                </tr>
                            </tbody>
                        </table>

                        <!-- Pagination -->
                        <nav th:if="${rooms != null and !#lists.isEmpty(rooms)}">
                            <ul class="pagination pagination-sm justify-content-center mb-0">
                                <li class="page-item" th:classappend="${page <= 1 ? 'disabled' : ''}">
                                    <a class="page-link"
                                       th:href="@{/admin/rooms(page=${page - 1}, kw=${kw}, status=${status}, typeId=${typeId})}">
                                        &laquo;
                                    </a>
                                </li>
                                <li class="page-item active">
                                    <span class="page-link" th:text="'Trang ' + ${page}"></span>
                                </li>
                                <li class="page-item" th:classappend="${#lists.size(rooms) < 8 ? 'disabled' : ''}">
                                    <a class="page-link"
                                       th:href="@{/admin/rooms(page=${page + 1}, kw=${kw}, status=${status}, typeId=${typeId})}">
                                        &raquo;
                                    </a>
                                </li>
                            </ul>
                        </nav>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <div th:replace="base :: footer"></div>
    <script th:src="@{/js/script.js}"></script>
</body>
</html>
