
<!<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
    <head>
        <title>eCommerce</title>
    <th:block th:replace="base :: css"></th:block>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
</head>
<body>
    <div th:replace="base :: header"></div>

    <section class="container">
        <div>
            <a th:href="@{/admin/rooms}" class="btn btn-info"> Thêm phòng</a>
        </div>
        <table class="table table-striped">
            <thead>
                <tr>
                    <th></th>
                    <th>Tên phòng</th>
                    <th>Loại phòng</th>
                    <th>Tầng</th>
                    <th>Giá phòng</th>
                    <th>Trạng thái</th>
                    <th></th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="r: ${rooms}">
                    <td>
                        <img th:src="${r.mainImage}" width="200" />
                    </td>
                    <td th:text="${r.name}"></td>
                    <td th:text="${r.roomTypeId.name}"> </td>
                    <td th:text="${r.floor}"></td>
                    <td th:text="${r.price} + 'VNĐ'"></td>
                    <td th:text="${r.status}"></td>
                    <td>
                        <a th:href="@{/admin/rooms/} + ${r.id}" class="btn btn-info">Cập nhật</a>
                        <button class="btn btn-danger" th:onclick="'deleteRoom(\'' + @{/api/rooms/} + ${r.id} + '\')'">Xóa</button>
                    </td>
                </tr>
            </tbody>
        </table>
    </section>

    <div th:replace="base :: footer"></div>
    <script th:src="@{/js/script.js}"></script>
</body>
</html>
